services:

  # ──────────────────────────────────────────────────────────────────────────
  # Режим 1: одиночная проверка — запустить и завершить
  #   docker compose run --rm dpi-once
  # ──────────────────────────────────────────────────────────────────────────
  dpi-once:
    build: .
    container_name: dpi-detector-once
    environment:
      RUN_MODE: "once"        # запустить тесты один раз и выйти
      TESTS: "123"            # 1=DNS, 2=Домены, 3=TCP 16-20KB
      METRICS_PORT: "9090"
      MAX_CONCURRENT: "30"
      BODY_INSPECT_LIMIT: "4096"
    # Метрики нужны редко при одиночном запуске, порт не пробрасываем

  # ──────────────────────────────────────────────────────────────────────────
  # Режим 2: фоновый демон — проверки каждые 2 часа + Prometheus метрики
  #   docker compose up -d dpi-schedule
  # ──────────────────────────────────────────────────────────────────────────
  dpi-schedule:
    build: .
    container_name: dpi-detector-schedule
    restart: unless-stopped
    environment:
      RUN_MODE: "schedule"    # повторять по расписанию
      TESTS: "123"            # набор тестов
      CHECK_INTERVAL: "7200" # интервал между проверками, секунды (7200 = 2 часа)
      METRICS_PORT: "9090"
      MAX_CONCURRENT: "30"
      BODY_INSPECT_LIMIT: "4096"
      METRICS_USER: "prometheus"  # Basic Auth логин
      METRICS_PASSWORD: "secret"  # Basic Auth пароль — СМЕНИТЕ!
    ports:
      - "9090:9090"
